---
rpi_prep:
  # Disable swap on Raspberry Pi server nodes before Kubernetes bootstrap.
  disable_swap: true

  # Kernel parameters required by K3s on Raspberry Pi OS for memory cgroups.
  required_cmdline_params:
    - cgroup_memory=1
    - cgroup_enable=memory

  # Boot config lines that disable unused onboard radios on Pi server nodes.
  required_config_lines:
    - dtoverlay=disable-wifi
    - dtoverlay=disable-bt

  # Kernel tunables required before enabling K3s protect-kernel-defaults.
  required_sysctls:
    vm.panic_on_oom: "0"
    vm.overcommit_memory: "1"
    kernel.panic: "10"
    kernel.panic_on_oops: "1"

k3s_server:
  # Built-in K3s components to disable in favor of explicitly managed platform choices.
  disable_components:
    - coredns
    - local-storage
    - metrics-server
    - servicelb

  # Enable K3s secrets encryption at rest from first bootstrap.
  secrets_encryption: true

  # Encryption provider to use for K3s secrets at rest on supported versions.
  secrets_encryption_provider: secretbox

  # Require host kernel tunables to match kubelet defaults before K3s starts.
  protect_kernel_defaults: true

  # Extra K3s server flags required by the current cluster networking design.
  extra_args:
    - flannel-backend=none
    - disable-network-policy=true
    - kube-apiserver-arg=enable-aggregator-routing=true

kube_vip:
  # Exact kube-vip version to pin for the control-plane registration VIP.
  version: v1.1.2

  # Priority class kube-vip should use to protect the control-plane VIP.
  priority_class_name: system-cluster-critical

  # Network interface kube-vip should advertise the control-plane VIP on.
  interface: eth0

cilium:
  # Exact Cilium version to pin for cluster networking.
  version: "1.19.3"

  # Exact Cilium CLI version to pin for bootstrap and validation operations.
  cli_version: v0.19.2

  # Capabilities granted to the Cilium agent container.
  agent_capabilities:
    - CHOWN
    - KILL
    - NET_ADMIN
    - NET_RAW
    - IPC_LOCK
    - SYS_MODULE
    - SYS_ADMIN
    - SYS_RESOURCE
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    - SYSLOG
    - NET_BIND_SERVICE

  # Number of Cilium operator replicas to run for HA control-plane networking.
  operator_replicas: 2

  # Cluster pool CIDR Cilium should allocate pod IPs from.
  cluster_pool_ipv4_pod_cidr_list: 10.42.0.0/16

  # API port Cilium should use when talking to the K3s control-plane VIP.
  k8s_service_port: 6443

  bgp:
    # Enable Cilium's BGP control plane so service VIPs can be advertised to the LAN router.
    enabled: true

    # Local ASN the cluster should advertise from when peering with the upstream router.
    local_asn: 65001

    # Upstream router ASN the cluster should establish a BGP session with.
    peer_asn: 65000

    # LAN address of the upstream BGP peer. Leave empty until your router-side config is chosen.
    peer_address: 192.168.3.1

    # Local TCP port Cilium should listen on for incoming BGP sessions.
    local_port: 179

    # Shared name for the generated Cilium BGP cluster configuration.
    cluster_config_name: unifi

    # Shared name for the generated Cilium BGP peer configuration.
    peer_config_name: unifi

    # Shared name for the generated Cilium BGP advertisement policy.
    advertisement_name: ingress-services

    # Shared name for the generated Cilium LB IP pool.
    ip_pool_name: ingress-services

    app_ip_pool:
      # Shared name for the generated Cilium LB IP pool used by app LoadBalancer services outside kube-system.
      name: app-services

      # First IP in the app-service LoadBalancer range advertised over BGP.
      start: 192.168.3.16

      # Last IP in the app-service LoadBalancer range advertised over BGP.
      stop: 192.168.3.23

    # Keepalive timer for the BGP session.
    keepalive_time_seconds: 30

    # Hold timer for the BGP session.
    hold_time_seconds: 90

    # Enable graceful restart for transient node or router restarts.
    graceful_restart_enabled: true

    # Graceful restart timer in seconds.
    graceful_restart_time_seconds: 120

  reloader:
    # Enable targeted Reloader integration for the Cilium agent and operator.
    enabled: true

    # Workload annotation key used by Stakater Reloader for explicit ConfigMap reloads.
    annotation_key: configmap.reloader.stakater.com/reload

    # Shared ConfigMap that should trigger Cilium workload restarts when it changes.
    configmap_name: cilium-config

reloader:
  # Namespace to install the Stakater Reloader controller into.
  namespace: reloader-system

  # Exact Helm chart version to pin for reproducible installs.
  chart_version: "2.2.11"

  # Priority class used to protect the controller from avoidable eviction.
  priority_class_name: system-cluster-critical

  # Reload strategy recommended by Stakater for GitOps-friendly rollouts.
  reload_strategy: annotations

  # Watch config and secret changes cluster-wide so later workloads can opt in without reinstalling the controller.
  watch_globally: true

  deployment:
    # HA replica count for the controller on this 3-server cluster.
    replicas: 2

    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        memory: 256Mi

  pod_disruption_budget:
    # Keep at least one controller pod available during voluntary disruptions.
    min_available: 1

traefik:
  # Namespace used by the bundled K3s Traefik packaged component.
  namespace: kube-system

  # IngressClass name Rancher and other apps should target.
  ingress_class_name: traefik

  # Service name created by the bundled Traefik release.
  service_name: traefik

  # Replica count sized for a 3-server control-plane-only cluster.
  replicas: 2

  # Priority class bundled Traefik should use to avoid avoidable eviction.
  priority_class_name: system-cluster-critical

  service:
    # Fixed LAN IP that Cilium LB IPAM should allocate to the bundled Traefik LoadBalancer service.
    load_balancer_ip: 192.168.3.3

    # Cilium load balancer class used for BGP-advertised services.
    load_balancer_class: io.cilium/bgp-control-plane

    # Spread north-south traffic across all healthy Traefik backends.
    external_traffic_policy: Cluster

k3s_system_addons:
  coredns:
    # CoreDNS image to pin when managing cluster DNS outside K3s packaged components.
    image: rancher/mirrored-coredns-coredns:1.14.2

    # Number of CoreDNS replicas to run for HA cluster DNS.
    replicas: 2

  metrics_server:
    # Metrics Server image to pin when managing the aggregated metrics API outside K3s packaged components.
    image: rancher/mirrored-metrics-server:v0.8.1

    # Number of Metrics Server replicas to run for HA resource metrics.
    replicas: 2

cert_manager:
  # Namespace to install cert-manager into.
  namespace: cert-manager

  # Exact cert-manager chart version to pin for reproducible bootstrap.
  chart_version: v1.20.2

  acme:
    # Production ACME endpoint used by the default cert-manager ClusterIssuer.
    server: https://acme-v02.api.letsencrypt.org/directory

    # Contact email cert-manager should register with the ACME server.
    email: desk.abhimanyu@gmail.com

  # ClusterIssuer name apps should reference for public certificates.
  cluster_issuer_name: cloudflare

  # Priority class cert-manager should use to protect certificate issuance and injection.
  priority_class_name: system-cluster-critical

  # Secret name used by cert-manager's Cloudflare DNS01 solver.
  cloudflare_api_token_secret_name: cloudflare-api-token-secret

  # High-availability replica count for the cert-manager controller.
  controller_replicas: 2

  # High-availability replica count for the cert-manager webhook.
  webhook_replicas: 2

  # High-availability replica count for the cert-manager CA injector.
  cainjector_replicas: 2

rancher:
  # Namespace to install Rancher into.
  namespace: cattle-system

  # Exact Rancher chart version to pin from rancher-stable.
  chart_version: "2.13.3"

  # Public hostname clients should use to reach Rancher.
  hostname: rancher.home

  # HA replica count for Rancher on this 3-server management cluster.
  replicas: 3

  # Require Rancher pods to land on different nodes.
  anti_affinity: required

  # Topology key used by Rancher's anti-affinity setting.
  topology_key: kubernetes.io/hostname

  # Priority class name Rancher should use.
  priority_class_name: rancher-critical

  ingress:
    # IngressClass name that should handle the Rancher ingress.
    class_name: traefik

    # Certificate source for the Rancher ingress. `rancher` uses Rancher's generated certificates.
    tls_source: rancher

    # Secret name Rancher is expected to publish for ingress TLS.
    tls_secret_name: tls-rancher-ingress

  service:
    # Keep Rancher behind Traefik instead of exposing it directly.
    type: ClusterIP

longhorn:
  # Longhorn host packages required on each Kubernetes node.
  required_packages:
    - cryptsetup
    - dmsetup
    - nfs-common
    - open-iscsi

  # Kernel modules Longhorn expects to be available on each node.
  required_kernel_modules:
    - dm_crypt
    - iscsi_tcp

  # Namespace to install Longhorn into.
  namespace: longhorn-system

  # Exact Longhorn chart version to pin for reproducible installs.
  chart_version: "1.11.1"

  # Default host path Longhorn should use for volume data on these NVMe-backed nodes.
  default_data_path: /var/lib/longhorn/

  # Default replica count for Kubernetes volumes created through the Longhorn StorageClass.
  default_class_replica_count: 1

  # Default replica count for volumes created through the Longhorn UI.
  default_replica_count: 1

  # Preferred data locality for volumes on this small Pi cluster.
  default_data_locality: best-effort

  # Root-disk-friendly over-provisioning percentage recommended by Longhorn.
  storage_overprovisioning_percentage: 100

  # Root-disk-friendly minimum available storage percentage recommended by Longhorn.
  storage_minimal_available_percentage: 25

  # Keep replica placement strict across nodes.
  replica_soft_anti_affinity: false

  # Keep Longhorn from provisioning volumes with fewer replicas than requested.
  allow_volume_creation_with_degraded_availability: false

  # Production-oriented replica balancing policy for this 3-node cluster.
  replica_auto_balance: least-effort

  # Reserve Longhorn instance-manager CPU using the v1 engine recommendation.
  guaranteed_instance_manager_cpu: 12

  # Keep the experimental v2 data engine disabled on these Raspberry Pi nodes.
  v2_data_engine: false

  # K3s kubelet root directory used by Longhorn CSI on modern K3s.
  kubelet_root_dir: /var/lib/kubelet

  # Reduce Longhorn CSI controller sidecar footprint to match the 3-node cluster.
  csi_controller_replicas: 2

  # Require Longhorn CSI controller sidecars to spread across nodes.
  csi_pod_anti_affinity_preset: hard
