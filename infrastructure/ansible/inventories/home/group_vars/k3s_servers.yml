---
# Disable swap on Raspberry Pi server nodes before Kubernetes bootstrap.
rpi_disable_swap: true

# Kernel parameters required by K3s on Raspberry Pi OS for memory cgroups.
rpi_required_cmdline_params:
  - cgroup_memory=1
  - cgroup_enable=memory

# Boot config lines that disable unused onboard radios on Pi server nodes.
rpi_required_config_lines:
  - dtoverlay=disable-wifi
  - dtoverlay=disable-bt

# Built-in K3s components to disable in favor of explicitly managed platform choices.
k3s_server_disable_components:
  - servicelb
  - traefik

# Extra K3s server flags required by the current cluster networking design.
k3s_server_extra_args:
  - flannel-backend=none
  - disable-network-policy=true
