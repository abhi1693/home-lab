---
argument_specs:
  main:
    short_description: Install and validate the Stakater Reloader controller from the bootstrap K3s server.
    options:
      k3s_node:
        type: dict
        required: true
        options:
          cluster_init:
            type: bool
            required: true
      reloader:
        type: dict
        required: true
        options:
          namespace:
            type: str
            required: true
          chart_version:
            type: str
            required: true
          priority_class_name:
            type: str
            required: true
          reload_strategy:
            type: str
            required: true
          watch_globally:
            type: bool
            required: true
          deployment:
            type: dict
            required: true
            options:
              replicas:
                type: int
                required: true
              resources:
                type: dict
                required: true
                options:
                  requests:
                    type: dict
                    required: true
                    options:
                      cpu:
                        type: str
                        required: true
                      memory:
                        type: str
                        required: true
                  limits:
                    type: dict
                    required: true
                    options:
                      memory:
                        type: str
                        required: true
          pod_disruption_budget:
            type: dict
            required: true
            options:
              min_available:
                type: int
                required: true
