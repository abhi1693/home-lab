---
- name: Assert Cilium is being installed from the bootstrap server
  ansible.builtin.assert:
    that:
      - k3s_cluster_init | bool
    fail_msg: cilium must be applied from the initial K3s server where k3s_cluster_init=true.
    success_msg: "Installing Cilium from the bootstrap K3s server"

- name: Assert Cilium install inputs are set
  ansible.builtin.assert:
    that:
      - k3s_registration_vip | trim != ''
      - cilium_version | trim != ''
      - cilium_cli_version | trim != ''
      - cilium_cluster_pool_ipv4_pod_cidr_list | trim != ''
      - cilium_operator_replicas | int > 0
      - cilium_k8s_service_port | int > 0
    fail_msg: Expected Cilium install inputs to be fully configured.
    success_msg: "Cilium install inputs are configured"

- name: Wait for local K3s API before installing Cilium
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 120

- name: Assert local K3s API is ready before installing Cilium
  ansible.builtin.command: /usr/local/bin/k3s kubectl get --raw=/readyz
  register: cilium_local_readyz
  changed_when: false

- name: Confirm local K3s API returned readyz ok
  ansible.builtin.assert:
    that:
      - cilium_local_readyz.stdout | trim == 'ok'
    fail_msg: Expected local K3s API /readyz endpoint to return ok before installing Cilium.
    success_msg: "Local K3s API is ready for Cilium installation"

- name: Map system architecture to Cilium CLI release architecture
  ansible.builtin.set_fact:
    cilium_cli_arch: >-
      {{
        {
          'aarch64': 'arm64',
          'arm64': 'arm64',
          'x86_64': 'amd64',
          'amd64': 'amd64'
        }.get(ansible_facts['architecture'], '')
      }}

- name: Assert Cilium CLI architecture is supported
  ansible.builtin.assert:
    that:
      - cilium_cli_arch | trim != ''
    fail_msg: "Unsupported architecture for Cilium CLI install: {{ ansible_facts['architecture'] }}"
    success_msg: "Using Cilium CLI architecture {{ cilium_cli_arch }}"

- name: Ensure local source directory exists for Cilium CLI downloads
  ansible.builtin.file:
    path: /usr/local/src
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check Cilium CLI binary path
  ansible.builtin.stat:
    path: /usr/local/bin/cilium
  register: cilium_cli_binary_stat

- name: Read installed Cilium CLI version
  ansible.builtin.command: /usr/local/bin/cilium version --client
  register: cilium_cli_version_output
  changed_when: false
  when: cilium_cli_binary_stat.stat.exists

- name: Record installed Cilium CLI version
  ansible.builtin.set_fact:
    cilium_cli_installed_version: >-
      {{
        ((cilium_cli_version_output.stdout | regex_search('v[0-9.]+')) | default(''))
      }}
  when: cilium_cli_binary_stat.stat.exists

- name: Download Cilium CLI archive
  ansible.builtin.get_url:
    url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_version }}/cilium-linux-{{ cilium_cli_arch }}.tar.gz"
    dest: "/usr/local/src/cilium-linux-{{ cilium_cli_arch }}-{{ cilium_cli_version }}.tar.gz"
    owner: root
    group: root
    mode: "0644"
  when:
    - not cilium_cli_binary_stat.stat.exists
      or (cilium_cli_installed_version | default('')) != cilium_cli_version

- name: Download Cilium CLI checksum
  ansible.builtin.get_url:
    url: "https://github.com/cilium/cilium-cli/releases/download/{{ cilium_cli_version }}/cilium-linux-{{ cilium_cli_arch }}.tar.gz.sha256sum"
    dest: "/usr/local/src/cilium-linux-{{ cilium_cli_arch }}-{{ cilium_cli_version }}.tar.gz.sha256sum"
    owner: root
    group: root
    mode: "0644"
  when:
    - not cilium_cli_binary_stat.stat.exists
      or (cilium_cli_installed_version | default('')) != cilium_cli_version

- name: Verify Cilium CLI archive checksum
  ansible.builtin.command:
    argv:
      - sha256sum
      - --check
      - "cilium-linux-{{ cilium_cli_arch }}-{{ cilium_cli_version }}.tar.gz.sha256sum"
  args:
    chdir: /usr/local/src
  when:
    - not cilium_cli_binary_stat.stat.exists
      or (cilium_cli_installed_version | default('')) != cilium_cli_version

- name: Install Cilium CLI
  ansible.builtin.unarchive:
    src: "/usr/local/src/cilium-linux-{{ cilium_cli_arch }}-{{ cilium_cli_version }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when:
    - not cilium_cli_binary_stat.stat.exists
      or (cilium_cli_installed_version | default('')) != cilium_cli_version

- name: Check for existing Cilium DaemonSet
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - get
      - daemonset
      - cilium
      - -o
      - jsonpath={.spec.template.spec.containers[0].image}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cilium_ds_image
  changed_when: false
  failed_when: false

- name: Check for existing Cilium operator deployment
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - get
      - deployment
      - cilium-operator
      - -o
      - jsonpath={.spec.template.spec.containers[0].image}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cilium_operator_image
  changed_when: false
  failed_when: false

- name: Install Cilium when not present
  ansible.builtin.command:
    argv:
      - /usr/local/bin/cilium
      - install
      - --version
      - "{{ cilium_version }}"
      - --set
      - "operator.replicas={{ cilium_operator_replicas }}"
      - --set
      - "ipam.operator.clusterPoolIPv4PodCIDRList={{ cilium_cluster_pool_ipv4_pod_cidr_list }}"
      - --set
      - "k8sServiceHost={{ k3s_registration_vip }}"
      - --set
      - "k8sServicePort={{ cilium_k8s_service_port }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cilium_install_result
  when: cilium_ds_image.rc != 0
  changed_when: true

- name: Upgrade Cilium when installed version differs from inventory
  ansible.builtin.command:
    argv:
      - /usr/local/bin/cilium
      - upgrade
      - --version
      - "{{ cilium_version }}"
      - --set
      - "operator.replicas={{ cilium_operator_replicas }}"
      - --set
      - "ipam.operator.clusterPoolIPv4PodCIDRList={{ cilium_cluster_pool_ipv4_pod_cidr_list }}"
      - --set
      - "k8sServiceHost={{ k3s_registration_vip }}"
      - --set
      - "k8sServicePort={{ cilium_k8s_service_port }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cilium_upgrade_result
  when:
    - cilium_ds_image.rc == 0
    - cilium_version not in cilium_ds_image.stdout
      or cilium_version not in cilium_operator_image.stdout
  changed_when: true

- name: Restart bootstrap kube-system deployments after first Cilium install
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - rollout
      - restart
      - "deployment/{{ item }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  loop:
    - coredns
    - local-path-provisioner
  when: cilium_install_result is changed
  changed_when: true

- name: Wait for restarted bootstrap kube-system deployments
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - rollout
      - status
      - "deployment/{{ item }}"
      - --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  loop:
    - coredns
    - local-path-provisioner
  when: cilium_install_result is changed
  changed_when: false
