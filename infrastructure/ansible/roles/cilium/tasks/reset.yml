---
- name: Assert Cilium reset is running on the bootstrap server
  ansible.builtin.assert:
    that:
      - k3s_cluster_init | bool
    fail_msg: cilium reset must run on the initial K3s server where k3s_cluster_init=true.
    success_msg: "Resetting Cilium from the bootstrap K3s server"

- name: Check Cilium CLI binary path
  ansible.builtin.stat:
    path: /usr/local/bin/cilium
  register: cilium_cli_binary_stat

- name: Uninstall Cilium from the cluster
  ansible.builtin.command:
    argv:
      - /usr/local/bin/cilium
      - uninstall
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: cilium_cli_binary_stat.stat.exists
  changed_when: true
