---
- name: Assert Cilium validation is running on the bootstrap server
  ansible.builtin.assert:
    that:
      - k3s_cluster_init | bool
    fail_msg: cilium validation must run on the initial K3s server where k3s_cluster_init=true.
    success_msg: "Validating Cilium from the bootstrap K3s server"

- name: Check Cilium CLI binary path
  ansible.builtin.stat:
    path: /usr/local/bin/cilium
  register: cilium_cli_binary_stat

- name: Assert Cilium CLI binary exists
  ansible.builtin.assert:
    that:
      - cilium_cli_binary_stat.stat.exists
    fail_msg: Expected /usr/local/bin/cilium to exist
    success_msg: "Cilium CLI binary is present"

- name: Read installed Cilium CLI version
  ansible.builtin.command: /usr/local/bin/cilium version --client
  register: cilium_cli_version_output
  changed_when: false

- name: Assert installed Cilium CLI version matches inventory
  ansible.builtin.assert:
    that:
      - cilium_cli_version in cilium_cli_version_output.stdout
    fail_msg: "Expected installed Cilium CLI version {{ cilium_cli_version }}"
    success_msg: "Installed Cilium CLI version matches {{ cilium_cli_version }}"

- name: Wait for Cilium to report healthy status
  ansible.builtin.command:
    argv:
      - /usr/local/bin/cilium
      - status
      - --wait
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cilium_status
  changed_when: false

- name: Wait for Cilium DaemonSet rollout
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - rollout
      - status
      - daemonset/cilium
      - --timeout=300s
  register: cilium_daemonset_rollout
  changed_when: false

- name: Wait for Cilium operator rollout
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - rollout
      - status
      - deployment/cilium-operator
      - --timeout=300s
  register: cilium_operator_rollout
  changed_when: false

- name: Count unique nodes hosting Cilium operator pods
  ansible.builtin.shell: >
    /usr/local/bin/k3s kubectl -n kube-system get pods -l io.cilium/app=operator
    -o custom-columns=NODE:.spec.nodeName --no-headers | sort -u | wc -l
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: cilium_operator_unique_nodes
  changed_when: false
  when: cilium_operator_replicas | int > 1

- name: Assert Cilium operator pods are spread across multiple nodes
  ansible.builtin.assert:
    that:
      - cilium_operator_unique_nodes.stdout | int >= 2
    fail_msg: Expected Cilium operator pods to be scheduled across at least two nodes.
    success_msg: "Cilium operator pods are spread across multiple nodes"
  when: cilium_operator_replicas | int > 1

- name: Wait for kube-system addon pods to become ready after Cilium install
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - wait
      - --for=condition=Ready
      - pod
      - --selector={{ item.selector }}
      - --timeout=300s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  loop:
    - name: coredns
      selector: k8s-app=kube-dns
    - name: local-path-provisioner
      selector: app=local-path-provisioner
    - name: metrics-server
      selector: k8s-app=metrics-server
  loop_control:
    label: "{{ item.name }}"
  register: cilium_core_pod_readiness
  changed_when: false

- name: Check K3s API readiness through the kube-vip endpoint after Cilium install
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - --kubeconfig
      - /etc/rancher/k3s/k3s.yaml
      - --server=https://{{ k3s_registration_vip }}:{{ cilium_k8s_service_port }}
      - get
      - --raw=/readyz
  register: cilium_vip_readyz
  changed_when: false

- name: Assert K3s API stays reachable through kube-vip after Cilium install
  ansible.builtin.assert:
    that:
      - cilium_vip_readyz.stdout | trim == 'ok'
    fail_msg: >-
      Expected K3s API /readyz endpoint to return ok through
      https://{{ k3s_registration_vip }}:{{ cilium_k8s_service_port }}
    success_msg: "K3s API is reachable through kube-vip after Cilium installation"
