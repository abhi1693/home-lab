---
argument_specs:
  main:
    short_description: Manage HA CoreDNS and Metrics Server manifests on the bootstrap K3s server.
    options:
      k3s_cluster_init:
        type: bool
        required: true
        description:
          - Whether the target node is the initial K3s control-plane node.
      k3s_coredns_image:
        type: str
        required: true
        description:
          - CoreDNS image to pin for the custom cluster DNS deployment.
      k3s_coredns_replicas:
        type: int
        required: true
        description:
          - Number of CoreDNS replicas to run.
      k3s_metrics_server_image:
        type: str
        required: true
        description:
          - Metrics Server image to pin for the custom aggregated metrics deployment.
      k3s_metrics_server_replicas:
        type: int
        required: true
        description:
          - Number of Metrics Server replicas to run.
