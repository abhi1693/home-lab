- name: Check K3s binary path
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary_stat

- name: Check K3s config path
  ansible.builtin.stat:
    path: /etc/rancher/k3s/config.yaml
  register: k3s_config_stat

- name: Read K3s config file
  ansible.builtin.slurp:
    path: /etc/rancher/k3s/config.yaml
  register: k3s_config_raw
  no_log: true
  when: k3s_config_stat.stat.exists

- name: Record K3s config text
  ansible.builtin.set_fact:
    k3s_config_text: "{{ k3s_config_raw.content | b64decode }}"
  no_log: true
  when: k3s_config_stat.stat.exists

- name: Check K3s encryption config path
  ansible.builtin.stat:
    path: /var/lib/rancher/k3s/server/cred/encryption-config.json
  register: k3s_encryption_config_stat

- name: Assert K3s binary and config exist
  ansible.builtin.assert:
    that:
      - k3s_binary_stat.stat.exists
      - k3s_config_stat.stat.exists
    fail_msg: "Expected /usr/local/bin/k3s and /etc/rancher/k3s/config.yaml to exist"
    success_msg: "K3s binary and config file exist"

- name: Assert cluster-init servers render cluster-init in config
  ansible.builtin.assert:
    that:
      - "'cluster-init: true' in k3s_config_text"
    fail_msg: "Expected cluster-init: true in /etc/rancher/k3s/config.yaml"
    success_msg: "K3s config declares cluster-init on the bootstrap server"
  when: k3s_cluster_init | bool

- name: Record expected K3s join config line
  ansible.builtin.set_fact:
    k3s_expected_join_server_line: 'server: "https://{{ k3s_registration_vip }}:6443"'
  when: not (k3s_cluster_init | bool)

- name: Assert joining servers render the shared registration endpoint in config
  ansible.builtin.assert:
    that:
      - k3s_expected_join_server_line in k3s_config_text
    fail_msg: >-
      Expected server: "https://{{ k3s_registration_vip }}:6443"
      in /etc/rancher/k3s/config.yaml
    success_msg: "K3s config points at the shared registration endpoint"
  when: not (k3s_cluster_init | bool)

- name: Read installed K3s version
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: k3s_version_output
  changed_when: false

- name: Assert installed K3s version matches inventory
  ansible.builtin.assert:
    that:
      - k3s_version in k3s_version_output.stdout
    fail_msg: "Expected installed K3s version {{ k3s_version }}"
    success_msg: "Installed K3s version matches {{ k3s_version }}"

- name: Check K3s service enablement
  ansible.builtin.command: systemctl is-enabled k3s
  register: k3s_service_enabled
  changed_when: false
  failed_when: false

- name: Check K3s service activity
  ansible.builtin.command: systemctl is-active k3s
  register: k3s_service_active
  changed_when: false
  failed_when: false

- name: Wait for K3s API port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 60

- name: Re-check K3s service activity after API wait
  ansible.builtin.command: systemctl is-active k3s
  register: k3s_service_active
  changed_when: false
  failed_when: false

- name: Assert K3s service is enabled and active
  ansible.builtin.assert:
    that:
      - k3s_service_enabled.stdout == 'enabled'
      - k3s_service_active.stdout == 'active'
    fail_msg: "Expected k3s service to be enabled and active"
    success_msg: "K3s service is enabled and active"

- name: Check K3s API readiness endpoint
  ansible.builtin.command: /usr/local/bin/k3s kubectl get --raw=/readyz
  register: k3s_readyz
  changed_when: false

- name: Assert K3s API is reachable
  ansible.builtin.assert:
    that:
      - k3s_readyz.stdout | trim == 'ok'
    fail_msg: "Expected K3s API /readyz endpoint to return ok"
    success_msg: "K3s API /readyz endpoint returned ok"

- name: Assert K3s secrets encryption config exists when enabled
  ansible.builtin.assert:
    that:
      - not (k3s_secrets_encryption | bool) or k3s_encryption_config_stat.stat.exists
    fail_msg: "Expected /var/lib/rancher/k3s/server/cred/encryption-config.json when secrets encryption is enabled"
    success_msg: "K3s secrets encryption config state matches inventory"
