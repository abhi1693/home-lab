---
- name: Assert Rancher validation is running on the bootstrap server
  ansible.builtin.assert:
    that:
      - k3s_node.cluster_init | bool
    fail_msg: rancher validation must run on the initial K3s server where k3s_node.cluster_init=true.
    success_msg: "Validating Rancher from the bootstrap K3s server"

- name: Check Rancher manifest files
  ansible.builtin.stat:
    path: "{{ item }}"
  loop:
    - /var/lib/rancher/k3s/server/manifests/rancher-helmchart.yaml
  register: rancher_manifest_stats

- name: Assert Rancher manifest files exist
  ansible.builtin.assert:
    that:
      - item.stat.exists
    fail_msg: "Expected Rancher manifest {{ item.stat.path }} to exist"
    success_msg: "Rancher manifest {{ item.stat.path }} exists"
  loop: "{{ rancher_manifest_stats.results }}"

- name: Check Rancher priority class
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - get
      - priorityclass
      - "{{ rancher.priority_class_name }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Read installed Rancher HelmChart version
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - get
      - helmchart
      - rancher
      - -o
      - jsonpath={.spec.version}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_helmchart_version
  changed_when: false

- name: Assert installed Rancher HelmChart version matches inventory
  ansible.builtin.assert:
    that:
      - rancher_helmchart_version.stdout | trim == rancher.chart_version
    fail_msg: "Expected Rancher HelmChart version {{ rancher.chart_version }}"
    success_msg: "Installed Rancher HelmChart version matches {{ rancher.chart_version }}"

- name: Wait for Rancher deployment rollout
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ rancher.namespace }}"
      - rollout
      - status
      - deployment/rancher
      - --timeout=600s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false

- name: Read Rancher deployment replica count
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ rancher.namespace }}"
      - get
      - deployment
      - rancher
      - -o
      - jsonpath={.spec.replicas}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_replica_count
  changed_when: false

- name: Assert Rancher replica count matches inventory
  ansible.builtin.assert:
    that:
      - rancher_replica_count.stdout | int == rancher.replicas | int
    fail_msg: "Expected Rancher to run {{ rancher.replicas }} replicas"
    success_msg: "Rancher replica count matches {{ rancher.replicas }}"

- name: Read Rancher deployment priority class
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ rancher.namespace }}"
      - get
      - deployment
      - rancher
      - -o
      - jsonpath={.spec.template.spec.priorityClassName}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_priority_class
  changed_when: false

- name: Assert Rancher deployment uses the configured priority class
  ansible.builtin.assert:
    that:
      - rancher_priority_class.stdout | trim == rancher.priority_class_name
    fail_msg: "Expected Rancher to use priority class {{ rancher.priority_class_name }}"
    success_msg: "Rancher uses priority class {{ rancher.priority_class_name }}"

- name: Count unique nodes hosting Rancher pods
  ansible.builtin.shell: >
    /usr/local/bin/k3s kubectl -n {{ rancher.namespace }}
    get pods -l app=rancher
    -o custom-columns=NODE:.spec.nodeName --no-headers | awk 'NF' | sort -u | wc -l
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_unique_nodes
  changed_when: false

- name: Assert Rancher pods are spread across the expected number of nodes
  ansible.builtin.assert:
    that:
      - rancher_unique_nodes.stdout | int >= ([rancher.replicas | int, groups['k3s_servers'] | length] | min)
    fail_msg: Expected Rancher pods to be spread across distinct nodes for HA scheduling.
    success_msg: "Rancher pods are spread across the expected nodes"

- name: Read Rancher ingress class
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ rancher.namespace }}"
      - get
      - ingress
      - rancher
      - -o
      - jsonpath={.spec.ingressClassName}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_ingress_class
  changed_when: false

- name: Assert Rancher ingress class matches inventory
  ansible.builtin.assert:
    that:
      - rancher_ingress_class.stdout | trim == rancher.ingress.class_name
    fail_msg: "Expected Rancher ingressClassName {{ rancher.ingress.class_name }}"
    success_msg: "Rancher ingressClassName matches {{ rancher.ingress.class_name }}"

- name: Read Rancher ingress hostname
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ rancher.namespace }}"
      - get
      - ingress
      - rancher
      - -o
      - jsonpath={.spec.rules[0].host}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_ingress_hostname
  changed_when: false

- name: Assert Rancher ingress hostname matches inventory
  ansible.builtin.assert:
    that:
      - rancher_ingress_hostname.stdout | trim == rancher.hostname
    fail_msg: "Expected Rancher ingress hostname {{ rancher.hostname }}"
    success_msg: "Rancher ingress hostname matches {{ rancher.hostname }}"

- name: Read Rancher ingress TLS secret name
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ rancher.namespace }}"
      - get
      - ingress
      - rancher
      - -o
      - jsonpath={.spec.tls[0].secretName}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_ingress_tls_secret
  changed_when: false

- name: Assert Rancher ingress TLS secret matches inventory
  ansible.builtin.assert:
    that:
      - rancher_ingress_tls_secret.stdout | trim == rancher.ingress.tls_secret_name
    fail_msg: "Expected Rancher ingress TLS secret {{ rancher.ingress.tls_secret_name }}"
    success_msg: "Rancher ingress TLS secret matches {{ rancher.ingress.tls_secret_name }}"

- name: Read Rancher ingress TLS source from HelmChart values
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - kube-system
      - get
      - helmchart
      - rancher
      - -o
      - jsonpath={.spec.valuesContent}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_values_content
  changed_when: false

- name: Assert Rancher HelmChart uses the configured TLS source
  ansible.builtin.assert:
    that:
      - '"source: " ~ rancher.ingress.tls_source in rancher_values_content.stdout'
    fail_msg: "Expected Rancher ingress TLS source {{ rancher.ingress.tls_source }}"
    success_msg: "Rancher ingress TLS source matches {{ rancher.ingress.tls_source }}"

- name: Read Rancher service type
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ rancher.namespace }}"
      - get
      - service
      - rancher
      - -o
      - jsonpath={.spec.type}
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_service_type
  changed_when: false

- name: Assert Rancher service type matches inventory
  ansible.builtin.assert:
    that:
      - rancher_service_type.stdout | trim == rancher.service.type
    fail_msg: "Expected Rancher service type {{ rancher.service.type }}"
    success_msg: "Rancher service type matches {{ rancher.service.type }}"

- name: Wait for Rancher ingress TLS Secret to exist
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ rancher.namespace }}"
      - get
      - secret
      - "{{ rancher.ingress.tls_secret_name }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: rancher_ingress_tls_secret_check
  changed_when: false
  until: rancher_ingress_tls_secret_check.rc == 0
  retries: 60
  delay: 5

- name: Check Rancher bootstrap Secret exists
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ rancher.namespace }}"
      - get
      - secret
      - bootstrap-secret
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  no_log: true
