---
- name: Assert Longhorn inputs are configured
  ansible.builtin.assert:
    that:
      - longhorn.required_packages | length > 0
      - longhorn.required_kernel_modules | length > 0
      - longhorn.namespace | trim != ''
      - longhorn.chart_version | trim != ''
      - longhorn.default_data_path | trim != ''
      - longhorn.default_class_replica_count | int == 1
      - longhorn.default_replica_count | int == 1
      - longhorn.default_data_locality in ['disabled', 'best-effort']
      - longhorn.storage_overprovisioning_percentage | int > 0
      - longhorn.storage_minimal_available_percentage | int >= 0
      - not longhorn.replica_soft_anti_affinity | bool
      - not longhorn.allow_volume_creation_with_degraded_availability | bool
      - longhorn.replica_auto_balance in ['disabled', 'least-effort', 'best-effort']
      - longhorn.guaranteed_instance_manager_cpu | int > 0
      - not longhorn.v2_data_engine | bool
      - longhorn.kubelet_root_dir | trim != ''
      - longhorn.csi_controller_replicas | int >= 2
      - longhorn.csi_pod_anti_affinity_preset in ['soft', 'hard']
    fail_msg: Expected Longhorn prerequisites and root-disk-safe defaults to be configured before installation.
    success_msg: "Longhorn inputs are configured"

- name: Assert local-storage is disabled in K3s inventory
  ansible.builtin.assert:
    that:
      - "'local-storage' in k3s_server.disable_components"
    fail_msg: Expected local-storage to be disabled in k3s_server.disable_components before installing Longhorn.
    success_msg: "K3s local-storage is disabled in inventory"
  when: k3s_node.cluster_init | bool

- name: Install Longhorn host packages
  ansible.builtin.package:
    name: "{{ longhorn.required_packages }}"
    state: present

- name: Ensure modules-load directory exists
  ansible.builtin.file:
    path: /etc/modules-load.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Persist Longhorn kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/longhorn.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      {% for module in longhorn.required_kernel_modules %}
      {{ module }}
      {% endfor %}

- name: Load Longhorn kernel modules now
  ansible.builtin.command:
    argv:
      - modprobe
      - "{{ item }}"
  loop: "{{ longhorn.required_kernel_modules }}"
  changed_when: false

- name: Gather service facts for Longhorn host preparation
  ansible.builtin.service_facts:

- name: Ensure iscsid service is enabled and running
  ansible.builtin.systemd_service:
    name: iscsid.service
    enabled: true
    state: started

- name: Stop and mask multipathd when present
  ansible.builtin.systemd_service:
    name: multipathd.service
    enabled: false
    state: stopped
    masked: true
  when: "'multipathd.service' in ansible_facts.services"

- name: Ensure Longhorn default data path exists
  ansible.builtin.file:
    path: "{{ longhorn.default_data_path }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Wait for local K3s API before deploying Longhorn
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    timeout: 120
  when: k3s_node.cluster_init | bool

- name: Confirm local K3s API is ready before deploying Longhorn
  ansible.builtin.command: /usr/local/bin/k3s kubectl get --raw=/readyz
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: longhorn_local_readyz
  changed_when: false
  when: k3s_node.cluster_init | bool

- name: Assert local K3s API returned readyz ok
  ansible.builtin.assert:
    that:
      - longhorn_local_readyz.stdout | trim == 'ok'
    fail_msg: Expected local K3s API /readyz endpoint to return ok before deploying Longhorn.
    success_msg: "Local K3s API is ready for Longhorn deployment"
  when: k3s_node.cluster_init | bool

- name: Ensure K3s manifests directory exists for Longhorn
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: k3s_node.cluster_init | bool

- name: Render Longhorn HelmChart manifest
  ansible.builtin.template:
    src: longhorn-helmchart.yaml.j2
    dest: /var/lib/rancher/k3s/server/manifests/longhorn.yaml
    owner: root
    group: root
    mode: "0644"
  when: k3s_node.cluster_init | bool

- name: Wait for Longhorn namespace to exist
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - get
      - namespace
      - "{{ longhorn.namespace }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: longhorn_namespace_check
  changed_when: false
  until: longhorn_namespace_check.rc == 0
  retries: 90
  delay: 5
  when: k3s_node.cluster_init | bool

- name: Wait for Longhorn core workloads to exist
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ longhorn.namespace }}"
      - get
      - "{{ item }}"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: longhorn_core_workloads
  changed_when: false
  until: longhorn_core_workloads.rc == 0
  retries: 90
  delay: 5
  loop:
    - daemonset/longhorn-manager
    - deployment/longhorn-driver-deployer
    - deployment/longhorn-ui
  when: k3s_node.cluster_init | bool

- name: Wait for Longhorn manager DaemonSet rollout
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ longhorn.namespace }}"
      - rollout
      - status
      - daemonset/longhorn-manager
      - --timeout=600s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  when: k3s_node.cluster_init | bool

- name: Wait for Longhorn deployments to roll out
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ longhorn.namespace }}"
      - rollout
      - status
      - "deployment/{{ item }}"
      - --timeout=600s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  loop:
    - longhorn-driver-deployer
    - longhorn-ui
  when: k3s_node.cluster_init | bool

- name: Wait for Longhorn storage class to exist
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - get
      - storageclass
      - longhorn
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: longhorn_storage_class
  changed_when: false
  until: longhorn_storage_class.rc == 0
  retries: 90
  delay: 5
  when: k3s_node.cluster_init | bool

- name: Wait for all Longhorn pods to become Ready
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - -n
      - "{{ longhorn.namespace }}"
      - wait
      - --for=condition=Ready
      - pod
      - --all
      - --timeout=600s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  when: k3s_node.cluster_init | bool
