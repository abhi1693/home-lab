---
argument_specs:
  main:
    short_description: Prepare Longhorn node prerequisites and install the Longhorn chart from the bootstrap K3s server.
    options:
      k3s_cluster_init:
        type: bool
        required: true
        description:
          - Whether the target node is the initial K3s control-plane node.
      k3s_server_disable_components:
        type: list
        elements: str
        required: true
        description:
          - Built-in K3s components disabled for this cluster.
      longhorn_required_packages:
        type: list
        elements: str
        required: true
        description:
          - Host packages required before Longhorn can run.
      longhorn_required_kernel_modules:
        type: list
        elements: str
        required: true
        description:
          - Kernel modules Longhorn expects to be present on each node.
      longhorn_namespace:
        type: str
        required: true
        description:
          - Namespace that Longhorn should run in.
      longhorn_chart_version:
        type: str
        required: true
        description:
          - Exact Longhorn chart version to install.
      longhorn_default_data_path:
        type: str
        required: true
        description:
          - Host path Longhorn should use for its default disk.
      longhorn_default_class_replica_count:
        type: int
        required: true
        description:
          - Default replica count for the Longhorn Kubernetes StorageClass.
      longhorn_default_replica_count:
        type: int
        required: true
        description:
          - Default replica count for volumes created from the Longhorn UI.
      longhorn_default_data_locality:
        type: str
        required: true
        description:
          - Default data locality for the Longhorn StorageClass.
      longhorn_storage_overprovisioning_percentage:
        type: int
        required: true
        description:
          - Longhorn storage over-provisioning percentage.
      longhorn_storage_minimal_available_percentage:
        type: int
        required: true
        description:
          - Longhorn minimum available storage percentage.
      longhorn_replica_soft_anti_affinity:
        type: bool
        required: true
        description:
          - Whether Longhorn may place healthy replicas of the same volume on the same node.
      longhorn_allow_volume_creation_with_degraded_availability:
        type: bool
        required: true
        description:
          - Whether Longhorn may create volumes before all requested replicas are schedulable.
      longhorn_replica_auto_balance:
        type: str
        required: true
        description:
          - Longhorn replica auto-balance policy.
      longhorn_guaranteed_instance_manager_cpu:
        type: int
        required: true
        description:
          - CPU percentage reserved for each Longhorn instance-manager pod.
      longhorn_v2_data_engine:
        type: bool
        required: true
        description:
          - Whether the experimental Longhorn v2 data engine should be enabled.
      longhorn_kubelet_root_dir:
        type: str
        required: true
        description:
          - Kubelet root directory Longhorn CSI should use on K3s.
      longhorn_csi_controller_replicas:
        type: int
        required: true
        description:
          - Replica count for Longhorn CSI controller sidecars.
      longhorn_csi_pod_anti_affinity_preset:
        type: str
        required: true
        description:
          - Anti-affinity preset for Longhorn CSI controller sidecars.
