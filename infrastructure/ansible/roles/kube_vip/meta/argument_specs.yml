---
argument_specs:
  main:
    short_description: Deploy kube-vip for the K3s control-plane registration VIP.
    options:
      k3s_cluster_init:
        type: bool
        required: true
        description:
          - Whether the target node is the initial K3s control-plane node.
      k3s_registration_vip:
        type: str
        required: true
        description:
          - Stable virtual IP used for K3s API access and server registration.
      kube_vip_version:
        type: str
        required: true
        description:
          - Exact kube-vip version to deploy.
      kube_vip_interface:
        type: str
        required: true
        description:
          - Network interface that should advertise the control-plane VIP.
      kube_vip_priority_class_name:
        type: str
        required: true
        description:
          - Priority class kube-vip should use to protect the control-plane VIP.
