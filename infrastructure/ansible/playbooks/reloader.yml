---
- name: Run reloader entrypoint
  hosts: "{{ reloader_target_hosts | default('server-1') }}"
  become: true
  gather_facts: true

  vars:
    reloader_selected_entrypoint: "{{ reloader_entrypoint | default('main') }}"

  pre_tasks:
    - name: Assert reloader entrypoint is supported
      ansible.builtin.assert:
        that:
          - reloader_selected_entrypoint in ['main', 'validation', 'reset']
        fail_msg: "Unsupported reloader entrypoint {{ reloader_selected_entrypoint }}"
        success_msg: "Running reloader entrypoint {{ reloader_selected_entrypoint }}"

  tasks:
    - name: Run reloader main entrypoint
      ansible.builtin.include_role:
        name: reloader
      when: reloader_selected_entrypoint == 'main'

    - name: Run reloader alternate entrypoint
      ansible.builtin.include_role:
        name: reloader
        tasks_from: "{{ reloader_selected_entrypoint }}"
        rolespec_validate: false
      when: reloader_selected_entrypoint != 'main'
