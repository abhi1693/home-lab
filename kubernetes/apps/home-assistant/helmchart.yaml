apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: home-assistant
  namespace: kube-system
spec:
  targetNamespace: home-assistant
  createNamespace: true
  chart: home-assistant
  repo: http://pajikos.github.io/home-assistant-helm-chart/
  version: 0.3.56
  timeout: 10m0s
  valuesContent: |-
    env:
      - name: TZ
        value: Asia/Kolkata

    ingress:
      enabled: true
      external: false
      className: traefik
      hosts:
        - host: ha.home
          paths:
            - path: /
              pathType: Prefix
      tls: []

    initContainers:
      - name: install-hacs
        image: ghcr.io/home-assistant/home-assistant:2026.4.4
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 0
        command:
          - /bin/sh
          - -c
        args:
          - |-
            set -e

            if [ -f /config/custom_components/hacs/manifest.json ]; then
              echo "HACS already installed"
              exit 0
            fi

            echo "Installing HACS 2.0.5"
            mkdir -p /config/custom_components/hacs
            wget -O /tmp/hacs.zip https://github.com/hacs/integration/releases/download/2.0.5/hacs.zip
            unzip -o /tmp/hacs.zip -d /config/custom_components/hacs >/dev/null
            rm -f /tmp/hacs.zip
        volumeMounts:
          - name: home-assistant
            mountPath: /config

    configuration:
      enabled: true
      forceInit: false
      trusted_proxies:
        - 10.42.0.0/16
      templateConfig: |-
        # Loads default set of integrations. Do not remove.
        default_config:

        http:
          use_x_forwarded_for: true
          trusted_proxies:
            - 10.42.0.0/16

        homeassistant:
          packages: !include_dir_named packages

        # Load frontend themes from the themes folder
        frontend:
          themes: !include_dir_merge_named themes

        automation: !include automations.yaml
        script: !include scripts.yaml
        scene: !include scenes.yaml
      initScript: |-
        #!/bin/sh
        set -e

        if [ ! -f /config/configuration.yaml ]; then
          echo "Configuration file not found, creating a new one"
          cp /config-templates/configuration.yaml /config/configuration.yaml
        fi

        yq -i '.homeassistant.packages = "packages" | .homeassistant.packages tag = "!include_dir_named"' /config/configuration.yaml

        if [ ! -f /config/automations.yaml ]; then
          echo "Automations file not found, creating a new one"
          printf '[]\n' > /config/automations.yaml
        fi

        if [ ! -f /config/scripts.yaml ]; then
          echo "Scripts file not found, creating a new one"
          touch /config/scripts.yaml
        fi

        if [ ! -f /config/scenes.yaml ]; then
          echo "Scenes file not found, creating a new one"
          touch /config/scenes.yaml
        fi

    statefulSetAnnotations:
      configmap.reloader.stakater.com/reload: home-assistant-packages

    additionalVolumes:
      - name: home-assistant-packages
        configMap:
          name: home-assistant-packages

    additionalMounts:
      - name: home-assistant-packages
        mountPath: /config/packages
        readOnly: true

    persistence:
      enabled: true
      accessMode: ReadWriteOnce
      size: 1Gi
      storageClass: longhorn

    resources:
      requests:
        cpu: 100m
        memory: 512Mi

    addons:
      codeserver:
        enabled: false
