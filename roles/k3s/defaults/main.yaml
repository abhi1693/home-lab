---
k3s_vars:
  cluster:
    controlplane:
      tainted: false
    domain: cluster.local
    kubeconfig:
      local: true
      # -- Local `/.kube` directory path
      path: "{{ lookup('ansible.builtin.env', 'HOME') }}/.kube"
    service:
      host: 127.0.0.1
      port: 6444
    tls_san:
      - "{{ groups.server[0] }}"
  release:
    k3s:
      checksum: sha256sum-arm64.txt
      file: k3s-arm64
      name: k3s
      repository:
        name: k3s
        org: k3s-io
      version: v1.35.3+k3s1
    kubepug:
      checksum: checksums.txt
      file: kubepug_linux_arm64.tar.gz
      name: kubepug
      repository:
        name: kubepug
        org: kubepug
      version: v1.7.1
  server:
    api:
      host: "{{ groups.server[0] }}"
      port: 6443
  service:
    debug: false
