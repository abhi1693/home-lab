---
- name: Reboot
  ansible.builtin.reboot:

- name: Reload sysctl parameters
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: false

- name: Restart kubernetes service
  ansible.builtin.systemd_service:
    name: '{{ k3s_node.service.name }}.service'
    state: restarted
    daemon_reload: true
    enabled: true
