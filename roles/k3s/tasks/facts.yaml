---
- name: Set map fact
  ansible.builtin.set_fact:
    k3s_map:
      node:
        default_registry_endpoint:
          enabled: true
        directory:
          bin: /usr/local/bin
          config: /etc/rancher/k3s
          data: /var/lib/rancher/k3s
        kubelet:
          eviction_hard:
            memory_available: 500Mi
          eviction_max_pod_grace_period: 60
          eviction_soft:
            memory_available: 1Gi
          system_reserved:
            cpu: 1000m
            ephemeral_storage: 5Gi
            memory: 1Gi
        sysctl_parameters:
          kernel.panic: 10
          kernel.panic_on_oops: 1
          vm.overcommit_memory: 1
          vm.swappiness: 1
      server:
        count: '{{ groups.server | length }}'
        default_host: '{{ groups.server[0] }}'
        etcd:
          election-timeout: 5000
          heartbeat-interval: 500
        ha: true
        hosts: '{{ groups.server }}'
        non_ha: '{{ groups.server | length == 1 }}'
  run_once: true

- name: Set map server fact
  ansible.builtin.set_fact:
    k3s_map_server:
      ips: "{{ k3s_map.server.hosts | map('extract', hostvars, ['ansible_facts', 'default_ipv4', 'address']) }}"
  when: inventory_hostname in k3s_map.server.hosts

- name: Set node fact
  ansible.builtin.set_fact:
    k3s_node:
      binary: "{{ lookup('vars', 'k3s_map')['node']['directory']['bin'] }}/{{ lookup('vars', 'k3s_vars')['release']['k3s']['name'] }}"
      ip: '{{ ansible_facts["default_ipv4"]["address"] }}'
      service:
        name: "{{ 'k3s-agent' if inventory_hostname not in groups.server else 'k3s' }}"
        type: "{{ 'agent' if inventory_hostname not in groups.server else 'server' }}"

- name: Set project fact
  ansible.builtin.set_fact:
    k3s_project:
      cluster:
        config: "{{ lookup('vars', 'k3s_map')['node']['directory']['config'] }}/config.yaml"
        config_kubelet: "{{ lookup('vars', 'k3s_map')['node']['directory']['config'] }}/kubelet.yaml"
        kubeconfig: "{{ lookup('vars', 'k3s_map')['node']['directory']['config'] }}/{{ lookup('vars', 'k3s_vars')['release']['k3s']['name'] }}.yaml"
        registries: "{{ lookup('vars', 'k3s_map')['node']['directory']['config'] }}/registries.yaml"
        token: >-
          {{
            lookup('vars', 'hostvars')
            .get(lookup('vars', 'k3s_map')['server']['default_host'], {})
            .get('k3s_project', {})
            .get('cluster', {})
            .get('token', '')
          }}
  run_once: true

- name: Set variables fact
  ansible.builtin.set_fact:
    k3s_vars: '{{ k3s_vars }}'
  run_once: true
