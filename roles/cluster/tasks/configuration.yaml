---
- name: Hardware Configuration
  notify: Reboot
  block:
    - name: Configure boot overlays for onboard radios
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        regexp: "^{{ item.overlay | regex_escape() }}$"
        line: "{{ item.overlay }}"
        state: "{{ 'absent' if item.enabled else 'present' }}"
      loop:
        - enabled: "{{ cluster_vars.service.bluetooth.enabled }}"
          overlay: dtoverlay=disable-bt
        - enabled: "{{ cluster_vars.service.wifi.enabled }}"
          overlay: dtoverlay=disable-wifi

    - name: Check if Raspberry Pi firmware cmdline exists
      ansible.builtin.stat:
        path: /boot/firmware/cmdline.txt
      register: cluster_boot_cmdline

    - name: Append required cgroup flags to kernel cmdline
      ansible.builtin.replace:
        path: "{{ cluster_boot_cmdline.stat.exists | ternary('/boot/firmware/cmdline.txt', '/boot/cmdline.txt') }}"
        regexp: '^(?=.*console=serial0)(?!.*\b{{ item | regex_escape() }}\b)(.*)$'
        replace: '\1 {{ item }}'
      loop:
        - cgroup_enable=cpuset
        - cgroup_memory=1
        - cgroup_enable=memory

    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Switch to legacy iptables on old releases
      when:
        - ansible_facts.packages['iptables'] is defined
        - ansible_facts.packages['iptables'][0]['version'] is version('1.6.2', '<')
      block:
        - name: Flush iptables before switching alternatives
          ansible.builtin.iptables:
            flush: true
          changed_when: false

        - name: Use iptables-legacy
          ansible.builtin.command:
            cmd: update-alternatives --set iptables /usr/sbin/iptables-legacy
          changed_when: true

        - name: Use ip6tables-legacy
          ansible.builtin.command:
            cmd: update-alternatives --set ip6tables /usr/sbin/ip6tables-legacy
          changed_when: true
