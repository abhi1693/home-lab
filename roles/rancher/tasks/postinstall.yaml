---
- name: Role Post-Install
  when: inventory_hostname in k3s_map.server.hosts
  run_once: true
  ansible.builtin.command:
    cmd: >-
      kubectl
      --kubeconfig {{ k3s_project.cluster.kubeconfig }}
      --namespace {{ rancher_vars.kubernetes.namespace }}
      rollout status deployment/{{ rancher_vars.kubernetes.helm.chart.name }}
      --timeout={{ rancher_map.helm.timeout }}
  register: rancher_result
  delay: 1
  retries: 3
  until: rancher_result is not failed
  changed_when: false
