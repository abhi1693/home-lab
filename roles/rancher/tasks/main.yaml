---
- name: Role Facts
  ansible.builtin.include_role:
    name: '{{ role }}'
    tasks_from: facts
  loop:
    - k3s
    - cert-manager
    - cilium
    - rancher
  loop_control:
    loop_var: role

- name: Role Provisioning
  when: inventory_hostname in k3s_map.server.hosts
  block:
    - name: Validate service state
      ansible.builtin.wait_for:
        port: '{{ k3s_vars.server.api.port }}'
        timeout: 30
      any_errors_fatal: true

    - name: Add repository
      kubernetes.core.helm_repository:
        name: '{{ rancher_vars.kubernetes.helm.repository.org }}'
        repo_url: '{{ rancher_map.helm.repository.url }}'
        force_update: true
      register: rancher_result
      delay: 1
      retries: 3
      until: rancher_result is not failed
      when: not rancher_map.helm.is_oci

    - name: Chart Setup
      run_once: true
      block:
        - name: Install chart
          kubernetes.core.helm:
            chart_ref: '{{ rancher_map.helm.chart.reference }}'
            chart_version: '{{ rancher_vars.kubernetes.helm.chart.version }}'
            kubeconfig: '{{ k3s_project.cluster.kubeconfig }}'
            name: '{{ rancher_vars.kubernetes.helm.chart.name }}'
            namespace: '{{ rancher_vars.kubernetes.namespace }}'
            timeout: '{{ rancher_map.helm.timeout }}'
            values: "{{ lookup('ansible.builtin.template', 'values.j2') | from_yaml }}"
            create_namespace: true
            update_repo_cache: '{{ not rancher_map.helm.is_oci }}'
            wait: true
          register: rancher_result
          delay: 1
          retries: 3
          until: rancher_result is not failed
